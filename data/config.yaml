# Example configuration for GeoNS geolocation microservice
server:
  port: 5300
  bind_address: "127.0.0.1"
  # Whitelist of networks (CIDR) that are allowed to make requests
  allowed_clients:
    - "127.0.0.0/8"
    # - "192.168.0.0/16"
    # - "10.0.0.0/8"
    # - "0.0.0.0/8"
    # - "::/0"

# Zones configuration - only configured zones will be loaded
# Each zone corresponds to a domain suffix and a specific MaxMind database
# Comment out zones you don't need to save resources
# (e.g., if you only need country info, comment out city and ASN zones)
zones:
  # Country zone
  # example domain for ip: 4.4.2.2 is 4.4.2.2.geons
  # example query: dig +short TXT 4.4.2.2.geons @127.0.0.1 -p 5300
  - name: ".geons"
    database:
      path: "GeoLite2-Country.mmdb" # "GeoIP2-Country.mmdb"
      type: "country"
    response:
      # Separator between field values in TXT record
      separator: "|"
      # Fields to extract from geoip2.Country structure
      # For geoip2.Country, the path is: Country.ISOCode (not Country.Country.ISOCode)
      # For localized names: Country.Names.English (not Names["en"])
      # See https://dev.maxmind.com/geoip/docs/databases/city-and-country/
      #
      # Example response for 8.8.8.8.geons: "US|United States"
      fields:
        - "Country.ISOCode"
        - "Country.Names.English"

  # ASN zone
  # example domain for ip: 4.4.2.2 is 4.4.2.2.asn
  # example query: dig +short TXT 4.4.2.2.asn @127.0.0.1 -p 5300
  - name: ".asn"
    database:
      path: "GeoLite2-ASN.mmdb"
      type: "asn"
    response:
      # Separator between field values in TXT record
      separator: "|"
      # Fields to extract from geoip2.ASN structure
      # Available fields:
      #   AutonomousSystemNumber - ASN number (e.g., 15169)
      #   AutonomousSystemOrganization - Organization name (e.g., "Google LLC")
      # see https://dev.maxmind.com/geoip/docs/databases/asn/
      #
      # Example response for 8.8.8.8.asn: "15169|Google LLC"
      fields:
        - "AutonomousSystemNumber"
        - "AutonomousSystemOrganization"

  # City zone
  # example domain for ip: 4.4.2.2 is 4.4.2.2.geocity
  # example query: dig +short TXT 4.4.2.2.geocity @127.0.0.1 -p 5300
  - name: ".geocity"
    database:
      path: "GeoLite2-City.mmdb" # "GeoIP2-City.mmdb"
      type: "city"
    response:
      # Separator between field values in TXT record
      separator: "|"
      # Fields to extract from geoip2.City structure
      # In geoip2 v2, localized names use typed fields: English, German, Spanish, French, etc.
      # Available fields:
      #   City.Names.English, City.Names.Russian, City.GeoNameID
      #   Subdivisions[0].Names.English, Subdivisions[0].ISOCode
      #   Country.ISOCode, Country.Names.English, Country.Names.Russian
      #   Location.Latitude, Location.Longitude, Location.TimeZone
      #   Postal.Code
      #   Continent.Code, Continent.Names.English
      # See https://dev.maxmind.com/geoip/docs/databases/city-and-country/
      #
      # Example response for 8.8.8.8.geocity:
      # "Mountain View|California|US|37.4056|-122.0775|America/Los_Angeles"
      fields:
        - "City.Names.English"
        - "Subdivisions[0].Names.English"
        - "Country.ISOCode"
        - "Location.Latitude"
        - "Location.Longitude"
        - "Location.TimeZone"
